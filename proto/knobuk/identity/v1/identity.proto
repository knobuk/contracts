syntax = "proto3";

package knobuk.identity.v1;

import "knobuk/common/v1/envelope.proto";

option go_package = "github.com/knobuk/shared/gen/go/knobuk/identity/v1;identityv1";

message Role {
  string id = 1;
  string code = 2;
  string name = 3;
  string description = 4;
}

message User {
  string id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string phone = 5;
  string username = 6;
  string avatar_key = 7;
  bool email_verified = 8;
  string status = 9;
  repeated Role roles = 10;
  string created_at = 11;
  string updated_at = 12;
}

message RegisterRequest {
  string first_name = 1;
  string last_name = 2;
  string email = 3;
  string phone = 4;
  string username = 5;
  string password = 6;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message RefreshRequest {
  string refresh_token = 1;
}

message ForgotPasswordRequest {
  string email = 1;
}

message ResetPasswordRequest {
  string token = 1;
  string password = 2;
}

message VerifyEmailRequest {
  string token = 1;
}

message AuthResponse {
  User user = 1;
  string access_token = 2;
  string refresh_token = 3;
  int64 expires_in = 4;
}

message ForgotPasswordResponse {
  string reset_token = 1;
}

message UpdateProfileRequest {
  string first_name = 1;
  string last_name = 2;
  string phone = 3;
  string username = 4;
  string avatar_key = 5;
}

message GetUserRequest {
  string user_id = 1;
}

message UpdateUserStatusRequest {
  string user_id = 1;
  string status = 2;
}

message ListUsersRequest {
  int32 page = 1;
  int32 size = 2;
  string status = 3;
}

message ListUsersResponse {
  repeated User users = 1;
  knobuk.common.v1.Pagination pagination = 2;
}

message AssignRoleRequest {
  string user_id = 1;
  string role_code = 2;
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  User user = 2;
}

service IdentityService {
  rpc Register(RegisterRequest) returns (AuthResponse);
  rpc Login(LoginRequest) returns (AuthResponse);
  rpc Refresh(RefreshRequest) returns (AuthResponse);
  rpc Logout(knobuk.common.v1.Empty) returns (knobuk.common.v1.Empty);
  rpc ForgotPassword(ForgotPasswordRequest) returns (ForgotPasswordResponse);
  rpc ResetPassword(ResetPasswordRequest) returns (knobuk.common.v1.Empty);
  rpc VerifyEmail(VerifyEmailRequest) returns (knobuk.common.v1.Empty);
  rpc GetMe(GetUserRequest) returns (User);
  rpc GetProfile(GetUserRequest) returns (User);
  rpc UpdateProfile(UpdateProfileRequest) returns (User);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc UpdateUserStatus(UpdateUserStatusRequest) returns (User);
  rpc AssignRole(AssignRoleRequest) returns (knobuk.common.v1.Empty);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
}
