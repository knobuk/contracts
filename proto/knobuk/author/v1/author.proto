syntax = "proto3";

package knobuk.author.v1;

import "knobuk/catalog/v1/catalog.proto";
import "knobuk/common/v1/envelope.proto";

option go_package = "github.com/knobuk/contracts/gen/go/knobuk/author/v1;authorv1";

message AuthorProfile {
  string id = 1;
  string user_id = 2;
  string pen_name = 3;
  string bio = 4;
  string photo_key = 5;
  string status = 6;
  string approved_at = 7;
  string approved_by = 8;
}

message ApplyRequest {
  string user_id = 1;
  string pen_name = 2;
  string bio = 3;
  string photo_key = 4;
}

message UpdateProfileRequest {
  string user_id = 1;
  string pen_name = 2;
  string bio = 3;
  string photo_key = 4;
}

message GetProfileRequest {
  string user_id = 1;
}

message ListApplicationsRequest {
  string status = 1;
  int32 page = 2;
  int32 size = 3;
}

message ListApplicationsResponse {
  repeated AuthorProfile profiles = 1;
  knobuk.common.v1.Pagination pagination = 2;
}

message ApproveRejectRequest {
  string profile_id = 1;
  string admin_id = 2;
}

message AuthorBooksRequest {
  string user_id = 1;
  int32 page = 2;
  int32 size = 3;
}

message AuthorBooksResponse {
  repeated knobuk.catalog.v1.Book books = 1;
  knobuk.common.v1.Pagination pagination = 2;
}

message CreateAuthorBookRequest {
  string user_id = 1;
  knobuk.catalog.v1.CreateBookRequest book = 2;
}

message UpdateAuthorBookRequest {
  string user_id = 1;
  string book_id = 2;
  knobuk.catalog.v1.UpdateBookRequest book = 3;
}

message SubmitBookRequest {
  string user_id = 1;
  string book_id = 2;
}

service AuthorService {
  rpc Apply(ApplyRequest) returns (AuthorProfile);
  rpc GetMe(GetProfileRequest) returns (AuthorProfile);
  rpc UpdateMe(UpdateProfileRequest) returns (AuthorProfile);
  rpc RequireApproved(GetProfileRequest) returns (AuthorProfile);
  rpc ListApplications(ListApplicationsRequest) returns (ListApplicationsResponse);
  rpc Approve(ApproveRejectRequest) returns (AuthorProfile);
  rpc Reject(ApproveRejectRequest) returns (AuthorProfile);
  rpc ListMyBooks(AuthorBooksRequest) returns (AuthorBooksResponse);
  rpc CreateBook(CreateAuthorBookRequest) returns (knobuk.catalog.v1.Book);
  rpc UpdateBook(UpdateAuthorBookRequest) returns (knobuk.catalog.v1.Book);
  rpc SubmitBook(SubmitBookRequest) returns (knobuk.catalog.v1.Book);
}
